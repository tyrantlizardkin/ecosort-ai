<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecosort-AI Splash</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: #1e1f29; display: flex; align-items: center; justify-content: center; }
.splash {
  width: 390px; height: 844px;
  background: #282a36;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  flex-shrink: 0;
}
.bg-glow {
  position: absolute;
  width: 340px; height: 340px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(80,250,123,0.08) 0%, transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%, -60%);
}
.grid-lines {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(98,114,164,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(98,114,164,0.08) 1px, transparent 1px);
  background-size: 32px 32px;
}
.logo-lockup {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; gap: 28px;
  margin-bottom: 20px;
}
.app-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 38px; font-weight: 700;
  letter-spacing: -1px; line-height: 1;
  color: #f8f8f2;
}
.tagline {
  font-size: 13px; font-weight: 400; letter-spacing: 0.5px;
  opacity: 0.55; margin-top: -16px;
  font-family: 'JetBrains Mono', monospace;
  color: #f8f8f2;
}
.ai-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; font-weight: 600;
  padding: 2px 7px; border-radius: 4px;
  vertical-align: middle; position: relative; top: -3px;
  margin-left: 4px; letter-spacing: 0.5px;
  background: rgba(80,250,123,0.12);
  color: #50fa7b;
  border: 1px solid rgba(80,250,123,0.3);
}
.loading-dots {
  position: absolute; bottom: 90px; z-index: 2;
  display: flex; gap: 6px;
}
.dot { width: 5px; height: 5px; border-radius: 50%; }
.dot.active { background: #50fa7b; opacity: 1; }
.dot.dim { background: #50fa7b; opacity: 0.3; }
.hack-badge {
  position: absolute; bottom: 40px; z-index: 2;
}
.hack-badge-inner {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase;
  padding: 5px 10px; border-radius: 20px;
  background: rgba(98,114,164,0.2);
  color: #6272a4;
  border: 1px solid rgba(98,114,164,0.3);
}
</style>
</head>
<body>
<div class="splash">
  <div class="bg-glow"></div>
  <div class="grid-lines"></div>
  <div class="logo-lockup">
    <svg width="110" height="175" viewBox="0 -45 110 175" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Circuit leaves from lid handle -->
      <line x1="55" y1="14" x2="55" y2="-28" stroke="#50fa7b" stroke-width="2" stroke-linecap="round"/>
      <path d="M55,-2 C47,-10 31,-14 34,-2 C37,8 53,6 55,-2 Z" fill="#50fa7b" opacity="0.75"/>
      <line x1="55" y1="-2" x2="37" y2="-3" stroke="#282a36" stroke-width="1" opacity="0.35"/>
      <path d="M55,-14 C63,-22 79,-22 76,-12 C73,-2 57,-6 55,-14 Z" fill="#50fa7b" opacity="0.55"/>
      <line x1="55" y1="-14" x2="74" y2="-14" stroke="#282a36" stroke-width="1" opacity="0.3"/>
      <circle cx="55" cy="-2" r="3.5" fill="#8be9fd"/>
      <circle cx="55" cy="-14" r="2.5" fill="#50fa7b"/>
      <line x1="45" y1="-2" x2="25" y2="-2" stroke="#8be9fd" stroke-width="1.3" opacity="0.5"/>
      <rect x="18" y="-6" width="7" height="8" rx="1.5" fill="none" stroke="#8be9fd" stroke-width="1.2" opacity="0.5"/>
      <line x1="65" y1="-2" x2="85" y2="-2" stroke="#8be9fd" stroke-width="1.3" opacity="0.5"/>
      <rect x="85" y="-6" width="7" height="8" rx="1.5" fill="none" stroke="#8be9fd" stroke-width="1.2" opacity="0.5"/>
      <circle cx="55" cy="-28" r="4" fill="#50fa7b"/>
      <circle cx="55" cy="-28" r="7" stroke="#50fa7b" stroke-width="1" fill="none" opacity="0.25"/>
      <!-- Lid handle knob -->
      <rect x="46" y="14" width="18" height="10" rx="5" fill="rgba(80,250,123,0.12)" stroke="#50fa7b" stroke-width="2.2"/>
      <!-- Lid -->
      <path d="M 22,24 L 22,38 Q 22,42 55,42 Q 88,42 88,38 L 88,24 Q 88,22 80,22 L 30,22 Q 22,22 22,24 Z" fill="rgba(80,250,123,0.10)" stroke="#50fa7b" stroke-width="2.2" stroke-linejoin="round"/>
      <line x1="26" y1="36" x2="84" y2="36" stroke="#50fa7b" stroke-width="1.2" opacity="0.3"/>
      <!-- Body -->
      <path d="M 26,42 L 30,118 Q 30,126 55,126 Q 80,126 80,118 L 84,42 Z" fill="rgba(80,250,123,0.10)" stroke="#50fa7b" stroke-width="2.2" stroke-linejoin="round"/>
      <!-- Three slots -->
      <rect x="36" y="56" width="12" height="46" rx="6" fill="rgba(80,250,123,0.08)" stroke="#50fa7b" stroke-width="1.8"/>
      <rect x="49" y="56" width="12" height="46" rx="6" fill="rgba(80,250,123,0.08)" stroke="#50fa7b" stroke-width="1.8"/>
      <rect x="62" y="56" width="12" height="46" rx="6" fill="rgba(80,250,123,0.08)" stroke="#50fa7b" stroke-width="1.8"/>
    </svg>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div class="app-name">
        <span style="color:#50fa7b;font-weight:700;">Eco</span><span style="font-weight:400;">sort</span><span class="ai-badge">AI</span>
      </div>
      <div class="tagline">smart waste. clean future.</div>
    </div>
  </div>
  <div class="loading-dots">
    <div class="dot active"></div>
    <div class="dot dim"></div>
    <div class="dot dim"></div>
  </div>
  <div class="hack-badge">
    <div class="hack-badge-inner">⬡ Hack Arizona 2026</div>
  </div>
</div>
</body>
</html>
